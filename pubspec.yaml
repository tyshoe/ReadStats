name: read_stats
description: "A new Flutter project."
publish_to: "none"
version: 0.2.1+9

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  carousel_slider: ^5.1.2
  csv: ^6.0.0
  file_picker: ^10.3.10
  fl_chart: ^1.2.0
  flex_color_picker: ^3.8.0
  fluentui_system_icons: ^1.1.273
  flutter_launcher_icons: ^0.14.4
  flutter_rating_bar: ^4.0.1
  google_fonts: ^8.0.2
  image_gallery_saver_plus: ^4.0.1
  image_picker: ^1.2.1
  intl: ^0.20.2
  package_info_plus: ^9.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  smooth_page_indicator: ^2.0.1
  sqflite: ^2.4.2
  stylish_bottom_bar: ^1.1.1
  font_awesome_flutter: ^10.8.0
  url_launcher: ^6.3.2
  mobile_scanner: ^7.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/icon/readstats.png"
    adaptive_icon_background: "#0D8BFF"
    adaptive_icon_foreground: "assets/icon/readstats_white.png"